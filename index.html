<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBISBRAND HUB | Professional Interiors & Paints</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Playfair+Display:ital,wght@0,700;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ibis-dark: #121212;      
            --ibis-accent: #D4AF37; /* Luxury Gold */
            --ibis-soft: #f8f5f0;      
            --glass: rgba(18, 18, 18, 0.88);
            --bg-vibrant: #f8f5f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-vibrant);
            color: var(--ibis-dark);
            overflow-x: hidden;
        }

        /* --- Header & Logo Pop --- */
        nav {
            position: fixed; top: 15px; left: 5%; right: 5%;
            padding: 8px 25px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 100px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo { 
            height: 55px; width: 55px; 
            background: #fff; 
            border-radius: 50%; 
            object-fit: contain; 
            padding: 7px; 
            /* Fix 1: High-contrast filter makes the logo details sharper */
            filter: contrast(1.1) brightness(1.05);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transition: 0.4s ease;
        }

        .nav-btn {
            background: var(--ibis-accent); color: #000;
            padding: 10px 22px; border-radius: 50px;
            text-decoration: none; font-weight: 800; font-size: 0.75rem;
            cursor: pointer; border: none; letter-spacing: 1px;
            /* Fix 3: Pulse animation for the "Book Now" button */
            animation: pulseNav 2s infinite;
        }

        @keyframes pulseNav {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); background: #fff; }
            100% { transform: scale(1); }
        }

        /* --- Hero Section & Faded Button --- */
        .hero {
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.3)),
                        url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
            color: white; padding: 0 20px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 5.5rem);
            line-height: 1.1; margin-bottom: 20px;
            /* Fix 1: Text reveal animation */
            animation: heroFadeIn 1.5s ease-out;
        }
        
        @keyframes heroFadeIn {
            from { opacity: 0; transform: translateY(30px); letter-spacing: -5px; }
            to { opacity: 1; transform: translateY(0); letter-spacing: normal; }
        }

        .hero span { color: var(--ibis-accent); font-style: italic; }

        /* Fix 2: Semi-transparent Faded Hero Button */
        .btn-gold {
            display: inline-block; padding: 18px 40px;
            background: rgba(212, 175, 55, 0.15); /* Faded / Transparent */
            color: var(--ibis-accent);
            text-decoration: none; font-weight: 800; border-radius: 0;
            border: 1px solid var(--ibis-accent);
            backdrop-filter: blur(5px);
            cursor: pointer; font-family: 'Outfit';
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase; letter-spacing: 2px;
            /* Subtle floating animation */
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .btn-gold:hover { 
            background: var(--ibis-accent); 
            color: #000; 
            box-shadow: 0 15px 40px rgba(212,175,55,0.4);
        }

        /* --- Sections & Cards --- */
        .section { padding: 100px 8%; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }

        .reveal { opacity: 0; transform: translateY(50px); transition: 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .card {
            background: white; border-radius: 0; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            transition: 0.5s;
        }

        /* Fix 3: Dynamic Order/Book Button Animation */
        .card .btn-gold {
            width: 100%;
            animation: none; /* No float for card buttons */
            background: var(--ibis-dark);
            color: #fff;
            border: none;
            padding: 15px;
            font-size: 0.8rem;
        }
        .card:hover .btn-gold {
            background: var(--ibis-accent);
            color: #000;
        }

        /* --- Modal Pop-up Styling --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .modal-content {
            background: var(--ibis-soft); padding: 45px; border-radius: 0;
            width: 90%; max-width: 500px; position: relative;
            transform: scale(0.8); transition: 0.4s;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }

        /* --- WhatsApp Glow --- */
        .wa-float {
            position: fixed; bottom: 30px; right: 30px;
            background: #25D366; width: 65px; height: 65px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; box-shadow: 0 10px 20px rgba(37,211,102,0.3); z-index: 2000;
            animation: waPulse 2s infinite;
        }
        @keyframes waPulse {
            0% { box-shadow: 0 0 0 0 rgba(37,211,102, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(37,211,102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37,211,102, 0); }
        }

        footer { padding: 80px 5% 40px; background: var(--ibis-dark); color: white; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <img src="Screenshot_20260323-225453.jpg" class="logo" alt="IBISBRAND">
        <button onclick="toggleModal()" class="nav-btn">BOOK NOW</button>
    </nav>

    <header class="hero">
        <div class="reveal active">
            <h1>IBISBRAND <br><span>HUB</span></h1>
            <p style="font-size: 1.1rem; margin-bottom: 40px; font-weight: 300; letter-spacing: 3px; text-transform: uppercase;">Premium Interiors & Paints</p>
            <button onclick="toggleModal()" class="btn-gold">Request Private Consultation</button>
        </div>
    </header>

    <div class="modal-overlay" id="contactModal">
        <div class="modal-content">
            <span onclick="toggleModal()" style="position: absolute; top: 20px; right: 25px; font-size: 2rem; cursor: pointer;">&times;</span>
            <h2 style="font-family: 'Playfair Display'; font-size: 2rem;">Inquiry Form</h2>
            <p style="margin-bottom: 25px; color: #666;">Step into a world of refined design.</p>
            <form>
                <input type="text" placeholder="Full Name" style="width: 100%; padding: 15px; border: none; border-bottom: 1px solid #ddd; background: transparent; margin-bottom: 15px;">
                <input type="tel" placeholder="Phone Number" style="width: 100%; padding: 15px; border: none; border-bottom: 1px solid #ddd; background: transparent; margin-bottom: 25px;">
                <button type="submit" style="background: var(--ibis-dark); color: white; padding: 20px; width: 100%; border: none; font-weight: 800; cursor: pointer;">SUBMIT</button>
            </form>
        </div>
    </div>

    <section class="section">
        <h2 class="reveal" style="font-family: 'Playfair Display'; font-size: 3rem; margin-bottom: 50px;">Bespoke Services</h2>
        <div class="grid">
            <div class="card reveal">
                <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=600&q=80" class="card-img">
                <div style="padding: 30px; text-align: left;">
                    <h3>Interior Design</h3>
                    <p style="color: #666; margin-bottom: 20px;">Luxury environments tailored to your taste.</p>
                    <button onclick="toggleModal()" class="btn-gold">BOOK DESIGN</button>
                </div>
            </div>
            <div class="card reveal">
                <img src="https://images.unsplash.com/photo-1623835255306-868c63d9335e?auto=format&fit=crop&w=600&q=80" class="card-img">
                <div style="padding: 30px; text-align: left;">
                    <h3>Premium Paints</h3>
                    <p style="color: #666; margin-bottom: 20px;">Exotic palettes and perfect coatings.</p>
                    <button onclick="toggleModal()" class="btn-gold">ORDER PAINT</button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 The Ibisbrand Hub.</p>
    </footer>

    <a href="#" class="wa-float">
        <svg width="30" height="30" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
    </a>

    <script>
        function toggleModal() {
            const modal = document.getElementById('contactModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
            if(modal.style.display === 'flex') {
                setTimeout(() => modal.classList.add('active'), 10);
            } else {
                modal.classList.remove('active');
            }
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
